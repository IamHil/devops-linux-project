services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile

    expose:
      - "1212"

    env_file:
      - .env

  nginx:
    image: nginx:latest

    ports:
      - "8080:80"

    volumes:
      - ./nginx/conf/default.conf:/etc/nginx/conf.d/default.conf

    depends_on:
      - web
